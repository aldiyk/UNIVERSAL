<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Креативная капча</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f13;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .stars {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: var(--o);
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--o); }
    50% { opacity: 0.1; }
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 48px 40px;
    width: 420px;
    text-align: center;
    box-shadow: 0 0 60px rgba(99,102,241,0.15), 0 20px 60px rgba(0,0,0,0.5);
  }

  .lock-icon {
    width: 56px; height: 56px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 8px 24px rgba(99,102,241,0.4);
  }

  h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .subtitle {
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    margin-bottom: 32px;
  }

  /* === ARENA === */
  .arena-wrap {
    position: relative;
    margin-bottom: 24px;
  }

  .arena {
    position: relative;
    width: 100%;
    height: 200px;
    background: rgba(255,255,255,0.03);
    border: 1.5px dashed rgba(255,255,255,0.12);
    border-radius: 16px;
    overflow: hidden;
    cursor: crosshair;
  }

  .arena::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(99,102,241,0.06) 0%, transparent 70%);
  }

  .hint-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
    line-height: 1.5;
  }

  .hint-text.hidden { opacity: 0; }

  /* The escaping button */
  .escape-btn {
    position: absolute;
    padding: 10px 22px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(99,102,241,0.5);
    transition: box-shadow 0.2s;
    user-select: none;
    letter-spacing: 0.3px;
  }

  .escape-btn:hover {
    box-shadow: 0 6px 28px rgba(168,85,247,0.7);
  }

  .escape-btn.caught {
    background: linear-gradient(135deg, #10b981, #059669) !important;
    box-shadow: 0 6px 28px rgba(16,185,129,0.6) !important;
    animation: wiggle 0.4s ease;
  }

  @keyframes wiggle {
    0% { transform: scale(1); }
    30% { transform: scale(1.2); }
    60% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 8px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(99,102,241,0.6);
  }

  /* Status messages */
  .status {
    min-height: 22px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 20px;
    transition: all 0.3s;
  }

  .status.error { color: #f87171; }
  .status.success { color: #34d399; font-weight: 600; }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    letter-spacing: 0.3px;
  }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  .submit-btn:not(:disabled):hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(99,102,241,0.5);
  }

  .submit-btn:not(:disabled):active {
    transform: translateY(0);
  }

  /* Reset link */
  .reset-link {
    display: inline-block;
    margin-top: 16px;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.2s;
  }
  .reset-link:hover { color: rgba(255,255,255,0.6); }

  /* Success overlay */
  .success-overlay {
    position: absolute; inset: 0;
    background: rgba(15,15,19,0.95);
    border-radius: 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    z-index: 20;
  }

  .success-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .success-check {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: 0 8px 32px rgba(16,185,129,0.5);
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }

  .success-overlay h2 { color: #fff; font-size: 20px; }
  .success-overlay p { color: rgba(255,255,255,0.5); font-size: 13px; }

  /* Particle burst */
  .particle {
    position: fixed;
    pointer-events: none;
    width: 8px; height: 8px;
    border-radius: 50%;
    z-index: 100;
    animation: burst 0.8s ease-out forwards;
  }

  @keyframes burst {
    from { opacity: 1; transform: translate(0,0) scale(1); }
    to   { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<!-- Main card -->
<div class="card" id="card">
  <div class="lock-icon">🔐</div>
  <h1>Подтверди, что ты человек</h1>
  <p class="subtitle">Поймай кнопку — роботы не успевают 😈</p>

  <div class="arena-wrap">
    <div class="arena" id="arena">
      <div class="hint-text" id="hint">Наведи мышь<br>на кнопку</div>
      <button class="escape-btn" id="escapeBtn">Поймай меня!</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Прогресс</span>
      <span id="catchCount">0 / 3</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="status" id="status">Поймай кнопку 3 раза, чтобы продолжить</div>

  <button class="submit-btn" id="submitBtn" disabled>Войти на сайт →</button>
  <div class="reset-link" id="resetLink">Начать заново</div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-check">✓</div>
    <h2>Ты — человек!</h2>
    <p>Проверка пройдена успешно</p>
  </div>
</div>

<script>
  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --o:${0.1+Math.random()*0.5};
      animation-delay:${Math.random()*5}s;
    `;
    starsEl.appendChild(s);
  }

  // ── State ──
  const REQUIRED = 3;
  let catches = 0;
  let moving = false;
  let escapeCooldown = false;
  let caught = false;

  const arena    = document.getElementById('arena');
  const btn      = document.getElementById('escapeBtn');
  const hint     = document.getElementById('hint');
  const status   = document.getElementById('status');
  const fill     = document.getElementById('progressFill');
  const countEl  = document.getElementById('catchCount');
  const submitBtn= document.getElementById('submitBtn');
  const resetLink= document.getElementById('resetLink');
  const overlay  = document.getElementById('successOverlay');

  // Place button randomly inside arena
  function placeRandom(instant) {
    const arenaW = arena.offsetWidth;
    const arenaH = arena.offsetHeight;
    const bw = btn.offsetWidth  || 130;
    const bh = btn.offsetHeight || 40;
    const margin = 12;
    const x = margin + Math.random() * (arenaW - bw - margin*2);
    const y = margin + Math.random() * (arenaH - bh - margin*2);

    if (instant) {
      btn.style.transition = 'none';
    } else {
      btn.style.transition = 'left 0.18s cubic-bezier(0.25,0.46,0.45,0.94), top 0.18s cubic-bezier(0.25,0.46,0.45,0.94)';
    }
    btn.style.left = x + 'px';
    btn.style.top  = y + 'px';
  }

  // Init
  setTimeout(() => placeRandom(true), 50);

  // ── Escape on hover ──
  btn.addEventListener('mouseenter', () => {
    if (caught || escapeCooldown) return;
    escapeCooldown = true;

    // Update hint
    hint.classList.add('hidden');

    // Escape!
    placeRandom(false);
    setStatus('Почти! Ещё раз 😄', '');

    setTimeout(() => { escapeCooldown = false; }, 220);
  });

  // ── Catch on click ──
  btn.addEventListener('click', () => {
    if (caught) return;
    caught = true;
    catches++;

    btn.classList.add('caught');
    btn.textContent = '✓ Поймал!';

    // Particles
    spawnParticles();

    // Update progress
    const pct = (catches / REQUIRED) * 100;
    fill.style.width = pct + '%';
    countEl.textContent = `${catches} / ${REQUIRED}`;

    if (catches >= REQUIRED) {
      setStatus('Отлично! Ты точно человек 🎉', 'success');
      submitBtn.disabled = false;
      setTimeout(() => {
        btn.style.opacity = '0.4';
        btn.style.pointerEvents = 'none';
      }, 400);
    } else {
      setStatus(`Поймал! Ещё ${REQUIRED - catches} раз 👍`, 'success');
      setTimeout(() => {
        caught = false;
        btn.classList.remove('caught');
        btn.textContent = 'Поймай меня!';
        placeRandom(false);
      }, 700);
    }
  });

  // ── Submit ──
    submitBtn.addEventListener('click', () => {
    overlay.classList.add('show');
    spawnParticles(true);
    
    // Перенаправляем на главную страницу через 1.5 сек
    setTimeout(() => {
      window.location.href = 'home.html'; 
    }, 1500);
  });

  // ── Reset ──
  resetLink.addEventListener('click', () => {
    catches = 0; caught = false; escapeCooldown = false;
    fill.style.width = '0%';
    countEl.textContent = `0 / ${REQUIRED}`;
    btn.classList.remove('caught');
    btn.textContent = 'Поймай меня!';
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
    submitBtn.disabled = true;
    hint.classList.remove('hidden');
    overlay.classList.remove('show');
    setStatus('Поймай кнопку 3 раза, чтобы продолжить', '');
    setTimeout(() => placeRandom(true), 50);
  });

  function setStatus(msg, type) {
    status.textContent = msg;
    status.className = 'status' + (type ? ' ' + type : '');
  }

  // ── Particles ──
  function spawnParticles(big) {
    const colors = ['#6366f1','#a855f7','#ec4899','#10b981','#f59e0b','#3b82f6'];
    const count = big ? 40 : 18;
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.random() * 360) * Math.PI / 180;
      const dist  = 40 + Math.random() * (big ? 140 : 80);
      p.style.cssText = `
        left:${cx}px; top:${cy}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --tx:${Math.cos(angle)*dist}px;
        --ty:${Math.sin(angle)*dist}px;
        animation-duration:${0.5+Math.random()*0.5}s;
        animation-delay:${Math.random()*0.15}s;
        width:${4+Math.random()*8}px;
        height:${4+Math.random()*8}px;
      `;
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }
  }
</script>
</body>
</html>
